# emp-distribution manifest
# This file pins the exact version of every component in the distribution.
# Edit this file to bump component versions; CI assembles the bundle.

distribution: "2026.04.1"

# --- Software (deployed via update tarball) ---
components:
  OpcUaLpGbtServer:
    repo: paris-atlas-dcs/OpcUaLpGbtServer
    tag: "260408.1.62"
    asset: "OpcUaLpGbtServer-260408.1.62.tar.gz"

  psmonserver:
    repo: paris-atlas-dcs/psmonserver
    tag: "260409.3.6"
    asset: "psMonServer-260409.3.6.tar.gz"

  # LpGbtSw demonstrators: not separately packaged yet.
  # CLI tools (lpGbtIdentify, lpGbtAdc, etc.) are built from LpGbtSw
  # but currently deployed manually. TODO: add CI packaging for demonstrators.

# --- Base image components (used by build-image workflow) ---
base:
  epos-bsp:
    board: "emp-03-00-00"
    petalinux: "2023.2"

  epos-rootfs:
    os: "AlmaLinux 9"
    arch: "aarch64"

  firmware:
    hw-description: "emp-03-00-00"

# --- WinCC OA (not on board, tracked for compatibility) ---
scada:
  fwlpgbt:
    repo: paris-atlas-dcs/fwlpgbt
    note: "WinCC OA JCOP framework component — runs on SCADA, not on EMP"
