# emp-distribution manifest
#
# By default, assembly pulls the LATEST release from each repo.
# To pin a specific version, uncomment and set the 'tag' field.
# The asset pattern uses a glob — it matches whatever the latest release ships.

distribution: "2026.04.3"

# =============================================================================
# ON-BOARD SOFTWARE — deployed to EMP via update tarball
# =============================================================================
components:
  OpcUaLpGbtServer:
    repo: paris-atlas-dcs/OpcUaLpGbtServer
    asset: "OpcUaLpGbtServer-*.tar.gz"
    # tag: "260408.1.62"  # uncomment to pin

  psmonserver:
    repo: paris-atlas-dcs/psmonserver
    asset: "psMonServer-*.tar.gz"
    # tag: "260409.3.6"   # uncomment to pin

# =============================================================================
# CLIENT LIBRARIES — for building OPC UA clients that talk to EMP servers
# =============================================================================
client-libraries:
  UaoClientForLpGbt:
    repo: paris-atlas-dcs/UaoClientForLpGbt
    note: "C++ client library for OPC UA communication with OpcUaLpGbtServer"
    # Future: more client libraries can be added here
    # UaoClientForPsMon:
    #   repo: paris-atlas-dcs/UaoClientForPsMon

# =============================================================================
# SCADA INTEGRATION — WinCC OA / JCOP framework components (run on SCADA hosts)
# =============================================================================
scada:
  fwlpgbt:
    repo: paris-atlas-dcs/fwlpgbt
    note: "WinCC OA JCOP framework for lpGBT monitoring panels"
    # Future: more framework components can be added here
    # fwPsMon:
    #   repo: paris-atlas-dcs/fwPsMon

# =============================================================================
# EOS-HOSTED — CERN EOS artifacts (Kerberos auth required)
# =============================================================================
eos:
  firmware-overlay:
    eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/epos-bsp/emp/master
    pattern: "^emp-.*-firmware-overlay\\.tar\\.gz$"
    note: "hw_desc.bit.bin + hw_desc.dtbo for runtime FPGA loading"

  boot-files:
    eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/epos-bsp/emp/master
    pattern: "^emp-.*-boot-files\\.tar\\.gz$"
    note: "BOOT.BIN, image.ub, boot.scr — base image only"

  rootfs:
    eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/epos-bsp/emp/master
    pattern: "^emp-.*-rootfs-kernel-modules\\.tar\\.gz$"
    note: "AlmaLinux 9 rootfs + PetaLinux kernel modules — base image only"

# =============================================================================
# BASE IMAGE METADATA
# =============================================================================
base:
  board: "emp"
  petalinux: "2023.2"
  os: "AlmaLinux 9"
  arch: "aarch64"
