name: Software Release

on:
  push:
    branches: [main]
    paths: [manifest.yml]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override distribution version (leave empty to use manifest.yml)'
        required: false
        type: string

permissions:
  contents: write
  packages: read

jobs:
  assemble:
    name: Software Release Bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # CROSS_REPO_PAT: fine-grained PAT with read access to private repos

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            echo "version=${{ inputs.version_override }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(yq '.distribution' manifest.yml)" >> $GITHUB_OUTPUT
          fi

      - name: Download components
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          mkdir -p staging
          for component in $(yq '.components | keys | .[]' manifest.yml); do
            repo=$(yq ".components.$component.repo" manifest.yml)
            tag=$(yq ".components.$component.tag // \"\"" manifest.yml)
            asset=$(yq ".components.$component.asset" manifest.yml)

            if [ -n "$tag" ]; then
              echo "Downloading $component (pinned: $tag) from $repo..."
              gh release download "$tag" --repo "$repo" --pattern "$asset" --dir staging --clobber
            else
              echo "Downloading $component (latest) from $repo..."
              gh release download --repo "$repo" --pattern "$asset" --dir staging --clobber
            fi
          done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download GitLab components
        env:
          GITLAB_PAT: ${{ secrets.CERN_GITLAB_PAT }}
        run: |
          GITLAB_URL="https://gitlab.cern.ch"
          mkdir -p staging/gitlab

          # opcuaempmon: download latest successful build artifact (RPM)
          echo "Downloading opcuaempmon from CERN GitLab..."
          PROJECT_ID=$(curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/atlas-dcs-opcua-servers%2Fopcuaempmon" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          PIPELINE_ID=$(curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/$PROJECT_ID/pipelines?status=success&per_page=1" | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['id'])")
          JOB_ID=$(curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/$PROJECT_ID/pipelines/$PIPELINE_ID/jobs" | python3 -c "import json,sys; [print(j['id']) for j in json.load(sys.stdin) if j['name']=='build']")
          curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/$PROJECT_ID/jobs/$JOB_ID/artifacts" \
            -o staging/gitlab/opcuaempmon-artifacts.zip
          mkdir -p staging/gitlab/opcuaempmon
          unzip -o staging/gitlab/opcuaempmon-artifacts.zip -d staging/gitlab/opcuaempmon/
          echo "  Downloaded $(ls staging/gitlab/opcuaempmon/build/*.rpm 2>/dev/null | wc -l) RPM(s)"

          # emp-tools: clone and build from source (CI is broken upstream)
          echo "Cloning emp-tools from CERN GitLab..."
          git clone --depth 1 "https://oauth2:${GITLAB_PAT}@gitlab.cern.ch/emci-emp/emp-tools.git" staging/gitlab/emp-tools-src

      - name: Build emp-tools from source
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}/staging/gitlab/emp-tools-src:/src \
            -v ${{ github.workspace }}/staging/gitlab:/out \
            ghcr.io/paris-atlas-dcs/lpgbt-builder:latest \
            bash -c "
              cd /src/LogIt && mkdir -p build && cd build && cmake .. && make -j\$(nproc) && cd /src &&
              mkdir -p build && cd build &&
              cmake ../ -DHAVE_UIO=ON -DCMAKE_BUILD_TYPE=Release -DBUILD_FOR=EMPv3 \
                -DCMAKE_INSTALL_RPATH='\\\$ORIGIN/../lib' -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON &&
              make -j\$(nproc) &&
              mkdir -p /out/emp-tools/bin /out/emp-tools/lib &&
              cp /src/bin_EMPv3/* /out/emp-tools/bin/ &&
              ldd /out/emp-tools/bin/clkProgrammer | awk '/ => / {print \$3}' | while read dep; do
                [ -f \"\$dep\" ] && cp -L \"\$dep\" /out/emp-tools/lib/ 2>/dev/null || true
              done
            "

      - name: Clone client libraries and SCADA components
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          mkdir -p staging/client-libraries staging/scada

          # Client libraries (source repos for developers)
          for component in $(yq '.client-libraries | keys | .[]' manifest.yml 2>/dev/null); do
            repo=$(yq ".client-libraries.$component.repo" manifest.yml)
            echo "Cloning $component from $repo..."
            gh repo clone "$repo" "staging/client-libraries/$component" -- --depth 1 2>/dev/null || true
            rm -rf "staging/client-libraries/$component/.git"
          done

          # SCADA integration (source repos for WinCC OA developers)
          for component in $(yq '.scada | keys | .[]' manifest.yml 2>/dev/null); do
            repo=$(yq ".scada.$component.repo // \"\"" manifest.yml)
            [ -z "$repo" ] && continue
            echo "Cloning $component from $repo..."
            gh repo clone "$repo" "staging/scada/$component" -- --depth 1 2>/dev/null || true
            rm -rf "staging/scada/$component/.git"
          done

      - name: Assemble bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p bundle

          # Extract on-board component tarballs
          for tarball in staging/*.tar.gz; do
            [ -f "$tarball" ] || continue
            echo "Extracting $(basename $tarball)..."
            tar xzf "$tarball" -C bundle/
          done

          # Copy opcuaempmon (extract RPM contents)
          if ls staging/gitlab/opcuaempmon/build/*.rpm 1>/dev/null 2>&1; then
            echo "Extracting opcuaempmon RPM..."
            mkdir -p bundle/opcuaempmon
            cd staging/gitlab/opcuaempmon/build/
            rpm2cpio *.rpm | cpio -idm 2>/dev/null
            cp -r usr/local/* ../../../../../../bundle/opcuaempmon/ 2>/dev/null || \
            cp -r opt/* ../../../../../../bundle/opcuaempmon/ 2>/dev/null || true
            cd $GITHUB_WORKSPACE
          fi

          # Copy emp-tools
          if [ -d staging/gitlab/emp-tools/bin ]; then
            echo "Copying emp-tools..."
            cp -r staging/gitlab/emp-tools bundle/
          fi

          # Copy systemd units (including emp-tools services and timer)
          mkdir -p bundle/systemd
          cp systemd/*.service systemd/*.timer bundle/systemd/ 2>/dev/null || true

          # Copy client libraries (source, for developers)
          if [ -d staging/client-libraries ] && [ "$(ls -A staging/client-libraries)" ]; then
            cp -r staging/client-libraries bundle/
          fi

          # Copy SCADA integration (source, for WinCC OA developers)
          if [ -d staging/scada ] && [ "$(ls -A staging/scada)" ]; then
            cp -r staging/scada bundle/
          fi

          # Copy manifest and version
          cp manifest.yml bundle/
          echo "$VERSION" > bundle/version

          # Package
          tar czf "emp-${VERSION}.tar.gz" -C bundle .
          echo "Built emp-${VERSION}.tar.gz"
          ls -lh "emp-${VERSION}.tar.gz"

      - name: Upload to EOS
        uses: paris-atlas-dcs/epos-ci-images/.github/actions/eos-upload@master
        with:
          file: emp-${{ steps.version.outputs.version }}.tar.gz
          eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/emp-distribution/software
          keytab: ${{ secrets.CERN_KEYTAB_B64 }}
