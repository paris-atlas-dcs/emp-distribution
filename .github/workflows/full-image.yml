name: Full Image

# Builds a complete, ready-to-flash SD card image.
# Boot partition: BOOT.BIN + image.ub + boot.scr
# Root partition: AlmaLinux 9 + kernel modules + all software pre-installed
#                 + systemd services enabled + firmware in /lib/firmware/
#
# Output: emp-epos-<version>.img.gz (flashable SD card image)
#
# The user does: gunzip + dd to SD card, insert, power on.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g. 2026.04.1)'
        required: true
        type: string
      board:
        description: 'Board target'
        type: choice
        options:
          - emp
          - trenz
        default: emp

permissions:
  contents: write
  packages: read

jobs:
  build:
    name: Build Full Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Set up QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CROSS_REPO_PAT: fine-grained PAT with read access to private repos

      # =====================================================================
      # DOWNLOAD ALL COMPONENTS
      # =====================================================================

      - name: Create staging directory
        run: mkdir -p staging/software staging/gitlab

      - name: Download boot files from EOS
        uses: paris-atlas-dcs/epos-ci-images/.github/actions/eos-download@master
        with:
          eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/epos-bsp/${{ inputs.board }}/master
          filename: latest
          pattern: "^${{ inputs.board }}-.*-boot-files\\.tar"
          destination: staging/boot-files.tar.gz
          keytab: ${{ secrets.CERN_KEYTAB_B64 }}

      - name: Download rootfs from EOS
        uses: paris-atlas-dcs/epos-ci-images/.github/actions/eos-download@master
        with:
          eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/epos-bsp/${{ inputs.board }}/master
          filename: latest
          pattern: "^${{ inputs.board }}-.*-rootfs-kernel-modules\\.tar"
          destination: staging/rootfs.tar.gz
          keytab: ${{ secrets.CERN_KEYTAB_B64 }}

      - name: Download firmware overlay from EOS
        uses: paris-atlas-dcs/epos-ci-images/.github/actions/eos-download@master
        with:
          eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/epos-bsp/${{ inputs.board }}/master
          filename: latest
          pattern: "^${{ inputs.board }}-.*-firmware-overlay\\.tar"
          destination: staging/firmware-overlay.tar.gz
          keytab: ${{ secrets.CERN_KEYTAB_B64 }}

      - name: Download software from GitHub
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          mkdir -p staging/software
          for component in $(yq '.components | keys | .[]' manifest.yml); do
            repo=$(yq ".components.$component.repo" manifest.yml)
            tag=$(yq ".components.$component.tag // \"\"" manifest.yml)
            asset=$(yq ".components.$component.asset" manifest.yml)
            if [ -n "$tag" ]; then
              gh release download "$tag" --repo "$repo" --pattern "$asset" --dir staging/software --clobber
            else
              gh release download --repo "$repo" --pattern "$asset" --dir staging/software --clobber
            fi
          done

      - name: Download GitLab components
        env:
          GITLAB_PAT: ${{ secrets.CERN_GITLAB_PAT }}
        run: |
          GITLAB_URL="https://gitlab.cern.ch"
          mkdir -p staging/gitlab

          # opcuaempmon RPM
          echo "Downloading opcuaempmon..."
          PROJECT_ID=$(curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/atlas-dcs-opcua-servers%2Fopcuaempmon" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          PIPELINE_ID=$(curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/$PROJECT_ID/pipelines?status=success&per_page=1" | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['id'])")
          JOB_ID=$(curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/$PROJECT_ID/pipelines/$PIPELINE_ID/jobs" | python3 -c "import json,sys; [print(j['id']) for j in json.load(sys.stdin) if j['name']=='build']")
          curl -sf -H "PRIVATE-TOKEN: $GITLAB_PAT" \
            "$GITLAB_URL/api/v4/projects/$PROJECT_ID/jobs/$JOB_ID/artifacts" \
            -o staging/gitlab/opcuaempmon-artifacts.zip
          mkdir -p staging/gitlab/opcuaempmon
          unzip -o staging/gitlab/opcuaempmon-artifacts.zip -d staging/gitlab/opcuaempmon/

          # emp-tools: clone for build
          echo "Cloning emp-tools..."
          git clone --depth 1 --recurse-submodules "https://oauth2:${GITLAB_PAT}@gitlab.cern.ch/emci-emp/emp-tools.git" staging/gitlab/emp-tools-src

      - name: Build emp-tools from source
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}/staging/gitlab/emp-tools-src:/src \
            -v ${{ github.workspace }}/staging/gitlab:/out \
            ghcr.io/paris-atlas-dcs/lpgbt-builder:latest \
            bash -c "
              git clone --depth 1 https://github.com/paris-atlas-dcs/libuio.git /tmp/libuio &&
              cd /tmp/libuio && cmake . && make uio && make install && ldconfig &&
              cd /src && mkdir -p build && cd build &&
              cmake ../ -DHAVE_UIO=ON -DCMAKE_BUILD_TYPE=Release -DBUILD_FOR=EMPv3 &&
              make -j\$(nproc) &&
              mkdir -p /out/emp-tools/bin /out/emp-tools/lib &&
              cp /src/bin_EMPv3/* /out/emp-tools/bin/ &&
              for bin in /out/emp-tools/bin/*; do
                ldd \"\$bin\" 2>/dev/null | awk '/ => / {print \$3}' | while read dep; do
                  [ -f \"\$dep\" ] && cp -Ln \"\$dep\" /out/emp-tools/lib/ 2>/dev/null || true
                done
              done
            "

      # =====================================================================
      # INJECT SOFTWARE INTO ROOTFS
      # =====================================================================

      - name: Build full image
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"

          echo "=== Building EMP Full Image ${VERSION} ==="

          # --- Extract base rootfs ---
          echo "[1/7] Extracting base rootfs..."
          mkdir -p rootfs
          sudo tar xzf staging/rootfs.tar.gz -C rootfs/

          # --- Create /opt/emp structure ---
          echo "[2/7] Creating /opt/emp directory structure..."
          sudo mkdir -p rootfs/opt/emp/releases/${VERSION}
          sudo mkdir -p rootfs/opt/emp/config
          sudo mkdir -p rootfs/var/log/emp

          # --- Extract server packages ---
          echo "[3/7] Installing server packages..."
          for tarball in staging/software/*.tar.gz; do
            [ -f "$tarball" ] || continue
            echo "  Extracting $(basename $tarball)..."
            sudo tar xzf "$tarball" -C rootfs/opt/emp/releases/${VERSION}/
          done

          # Rename versioned dirs to clean names (strip version suffix)
          cd rootfs/opt/emp/releases/${VERSION}/
          for dir in OpcUaLpGbtServer-* psMonServer-*; do
            [ -d "$dir" ] || continue
            clean=$(echo "$dir" | sed 's/-[0-9].*//')
            sudo mv "$dir" "$clean"
            echo "  $dir -> $clean"
          done
          cd $GITHUB_WORKSPACE

          # --- Install emp-tools ---
          if [ -d staging/gitlab/emp-tools/bin ]; then
            echo "  Installing emp-tools..."
            sudo cp -r staging/gitlab/emp-tools rootfs/opt/emp/releases/${VERSION}/
          fi

          # --- Install opcuaempmon (from RPM → opt/empMonitor/) ---
          if ls staging/gitlab/opcuaempmon/build/*.rpm 1>/dev/null 2>&1; then
            echo "  Installing opcuaempmon from RPM..."
            mkdir -p /tmp/empmon-extract
            cd /tmp/empmon-extract
            bsdtar xf $GITHUB_WORKSPACE/staging/gitlab/opcuaempmon/build/*.rpm 2>/dev/null || \
              (rpm2cpio $GITHUB_WORKSPACE/staging/gitlab/opcuaempmon/build/*.rpm | cpio -idm 2>/dev/null)
            if [ -d opt/empMonitor ]; then
              sudo cp -r opt/empMonitor $GITHUB_WORKSPACE/rootfs/opt/emp/releases/${VERSION}/opcuaempmon
              echo "  Installed: $(ls $GITHUB_WORKSPACE/rootfs/opt/emp/releases/${VERSION}/opcuaempmon/bin/ 2>/dev/null)"
            fi
            cd $GITHUB_WORKSPACE
          fi

          # --- Create current symlink ---
          echo "[4/7] Creating /opt/emp/current symlink..."
          sudo ln -sfn /opt/emp/releases/${VERSION} rootfs/opt/emp/current
          echo "${VERSION}" | sudo tee rootfs/opt/emp/version > /dev/null

          # --- Install systemd services ---
          echo "[5/7] Installing systemd services..."
          sudo cp systemd/*.service systemd/*.timer rootfs/etc/systemd/system/ 2>/dev/null || true
          sudo mkdir -p rootfs/etc/systemd/system/multi-user.target.wants
          sudo mkdir -p rootfs/etc/systemd/system/timers.target.wants

          # Boot chain: firmware → clock → reset → OPC UA servers
          sudo ln -sf /etc/systemd/system/emp-firmware.service \
               rootfs/etc/systemd/system/multi-user.target.wants/
          sudo ln -sf /etc/systemd/system/emp-clock.service \
               rootfs/etc/systemd/system/multi-user.target.wants/
          sudo ln -sf /etc/systemd/system/emp-reset.service \
               rootfs/etc/systemd/system/multi-user.target.wants/

          # OPC UA servers (depend on emp-reset via After/Requires)
          sudo ln -sf /etc/systemd/system/opcua-lpgbt.service \
               rootfs/etc/systemd/system/multi-user.target.wants/
          sudo ln -sf /etc/systemd/system/opcua-psmon.service \
               rootfs/etc/systemd/system/multi-user.target.wants/
          sudo ln -sf /etc/systemd/system/opcua-empmon.service \
               rootfs/etc/systemd/system/multi-user.target.wants/

          # Temperature monitor (timer-based)
          sudo ln -sf /etc/systemd/system/tempMonitor.timer \
               rootfs/etc/systemd/system/timers.target.wants/

          # --- Install firmware overlay ---
          echo "[6/7] Installing firmware overlay..."
          sudo mkdir -p rootfs/lib/firmware
          sudo tar xzf staging/firmware-overlay.tar.gz -C rootfs/lib/firmware/ \
               2>/dev/null || echo "  No firmware overlay available"
          sudo cp scripts/loadFirmware.sh rootfs/usr/local/bin/
          sudo chmod +x rootfs/usr/local/bin/loadFirmware.sh

          # --- Install default configs ---
          echo "[7/7] Installing default configs..."
          REL="rootfs/opt/emp/releases/${VERSION}"
          if [ -f "$REL/OpcUaLpGbtServer/bin/config-example.xml" ]; then
            sudo cp "$REL/OpcUaLpGbtServer/bin/config-example.xml" \
                     "$REL/OpcUaLpGbtServer/bin/config-site.xml"
          fi
          if [ -f "$REL/psMonServer/bin/config.xml" ]; then
            sudo cp "$REL/psMonServer/bin/config.xml" \
                     "$REL/psMonServer/bin/config-site.xml"
          fi
          sudo cp manifest.yml rootfs/opt/emp/

          echo ""
          echo "=== /opt/emp contents ==="
          sudo ls -la rootfs/opt/emp/
          sudo ls -la rootfs/opt/emp/releases/${VERSION}/ || true

          # --- Create SD card image ---
          IMAGE="emp-epos-${VERSION}.img"
          IMAGE_SIZE_MB=4096  # 4GB — auto-expands on first boot

          echo "Creating ${IMAGE_SIZE_MB}MB disk image..."
          dd if=/dev/zero of="$IMAGE" bs=1M count=${IMAGE_SIZE_MB} status=progress

          # Partition: 512MB FAT32 (boot) + rest ext4 (rootfs)
          echo "Partitioning..."
          parted -s "$IMAGE" mklabel msdos
          parted -s "$IMAGE" mkpart primary fat32 1MiB 513MiB
          parted -s "$IMAGE" mkpart primary ext4 513MiB 100%
          parted -s "$IMAGE" set 1 boot on

          # Set up loopback device
          LOOP=$(sudo losetup --find --show --partscan "$IMAGE")
          echo "Loop device: $LOOP"

          # Format partitions
          echo "Formatting partitions..."
          sudo mkfs.vfat -F 32 -n BOOT "${LOOP}p1"
          sudo mkfs.ext4 -L rootfs "${LOOP}p2"

          # Mount and populate
          sudo mkdir -p /mnt/boot /mnt/rootfs

          echo "Populating boot partition..."
          sudo mount "${LOOP}p1" /mnt/boot
          mkdir -p boot
          tar xzf staging/boot-files.tar.gz -C boot/
          sudo cp -r boot/* /mnt/boot/
          sudo umount /mnt/boot

          echo "Populating rootfs partition (this may take a while)..."
          sudo mount "${LOOP}p2" /mnt/rootfs

          # Copy the enriched rootfs (base OS + all software from steps 1-7)
          sudo cp -a rootfs/* /mnt/rootfs/

          # Install firstboot script and marker
          sudo mkdir -p /mnt/rootfs/usr/local/bin /mnt/rootfs/opt/emp
          sudo cp scripts/emp-firstboot.sh /mnt/rootfs/usr/local/bin/
          sudo chmod +x /mnt/rootfs/usr/local/bin/emp-firstboot.sh
          sudo touch /mnt/rootfs/opt/emp/.firstboot

          # Enable firstboot service
          sudo cp systemd/emp-firstboot.service /mnt/rootfs/etc/systemd/system/
          sudo mkdir -p /mnt/rootfs/etc/systemd/system/multi-user.target.wants
          sudo ln -sf /etc/systemd/system/emp-firstboot.service \
               /mnt/rootfs/etc/systemd/system/multi-user.target.wants/

          sudo umount /mnt/rootfs

          # Detach loop device
          sudo losetup -d "$LOOP"

          # Compress
          echo "Compressing image..."
          gzip "$IMAGE"

          echo ""
          echo "=== Full Image Complete ==="
          ls -lh "emp-epos-${VERSION}.img.gz"

      # =====================================================================
      # PUBLISH
      # =====================================================================

      - name: Upload image to EOS
        uses: paris-atlas-dcs/epos-ci-images/.github/actions/eos-upload@master
        with:
          file: emp-epos-${{ inputs.version }}.img.gz
          eos-dir: /eos/project/a/atlasdcsdata/ci-artifacts/emp-distribution/image/${{ inputs.board }}
          keytab: ${{ secrets.CERN_KEYTAB_B64 }}
