name: Assemble Update

on:
  push:
    branches: [main]
    paths: [manifest.yml]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override distribution version (leave empty to use manifest.yml)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  assemble:
    name: Assemble Update Bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate token for private repo access
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: paris-atlas-dcs
          repositories: OpcUaLpGbtServer,psmonserver,LpGbtSw

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            echo "version=${{ inputs.version_override }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(yq '.distribution' manifest.yml)" >> $GITHUB_OUTPUT
          fi

      - name: Download components
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mkdir -p staging
          for component in $(yq '.components | keys | .[]' manifest.yml); do
            repo=$(yq ".components.$component.repo" manifest.yml)
            tag=$(yq ".components.$component.tag" manifest.yml)
            asset=$(yq ".components.$component.asset" manifest.yml)
            echo "Downloading $component ($tag) from $repo..."
            gh release download "$tag" --repo "$repo" --pattern "$asset" --dir staging --clobber
          done

      - name: Assemble bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p bundle

          # Extract component tarballs
          for tarball in staging/*.tar.gz; do
            [ -f "$tarball" ] || continue
            echo "Extracting $(basename $tarball)..."
            tar xzf "$tarball" -C bundle/
          done

          # Copy systemd units
          mkdir -p bundle/systemd
          cp systemd/*.service bundle/systemd/

          # Copy manifest and version
          cp manifest.yml bundle/
          echo "$VERSION" > bundle/version

          # Package
          tar czf "emp-update-${VERSION}.tar.gz" -C bundle .
          echo "Built emp-update-${VERSION}.tar.gz"
          ls -lh "emp-update-${VERSION}.tar.gz"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="update-${VERSION}"

          # Tag if not exists
          git tag "$TAG" 2>/dev/null && git push origin "$TAG" || true

          gh release create "$TAG" \
            "emp-update-${VERSION}.tar.gz" \
            manifest.yml \
            --title "Update $VERSION" \
            --generate-notes \
            || gh release upload "$TAG" "emp-update-${VERSION}.tar.gz" manifest.yml --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emp-update-${{ steps.version.outputs.version }}
          path: emp-update-*.tar.gz
          retention-days: 30
